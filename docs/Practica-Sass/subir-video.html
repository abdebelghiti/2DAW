<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir vídeo</title>
    <link rel="stylesheet" href="app/css/main.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="inicio.html" style="text-decoration: none"><div class="navbar__logo" aria-label href="inicio.html">YouTube</div></a>
            <ul class="navbar__links">
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="recomendados.html">Recomendados</a></li>
                <li><a href="subir-video.html">Subir vídeo</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="yt-upload-title">Subir vídeo</h1>
        <p class="yt-upload-subtitle">Datos del vídeo:</p>

        <div class="card">
            <form>
                <label>Título</label>
                <input type="text" class="input" placeholder="Introduce el título">

                <label>Descripción</label>
                <textarea class="input" placeholder="Introduce la descripción"></textarea>

                <label>Vídeo</label>
                <input type="file">

                <button class="btn">Subir</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>© 2025 - YouTube</p>
    </footer>

</body>
</html>
