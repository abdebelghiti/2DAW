<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Armas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="theme.js" defer></script>
  <script src="navbar.js" defer></script>
  <script src="valorant.js" defer></script>
</head>

<body class="min-h-screen bg-white dark:bg-gray-900 text-gray-900 dark:text-white">
  <nav
    class="fixed top-0 w-full bg-white/70 dark:bg-black/50 backdrop-blur-lg px-8 py-4 flex justify-between items-center z-50 shadow-md border-b border-gray-200 dark:border-gray-800">
    <h1 class="text-2xl font-bold text-red-600">VALORANT</h1>
    <div class="flex items-center gap-6">
      <a id="navInicio" href="index.html" class="px-3 py-1">Inicio</a>
      <a id="navPersonajes" href="personajes.html" class="px-3 py-1">Agentes</a>
      <a id="navArmas" href="armas.html" class="px-3 py-1">Armas</a>
      <div class="relative">
        <button id="themeDropdownBtn" class="bg-red-600 text-white px-3 py-1 rounded">Tema</button>
        <div id="themeDropdown" class="hidden absolute right-0 mt-2 w-32 bg-white dark:bg-gray-800 rounded shadow">
          <button data-theme="light"
            class="block w-full px-4 py-2 text-left hover:bg-gray-200 dark:hover:bg-gray-700">Claro</button>
          <button data-theme="dark"
            class="block w-full px-4 py-2 text-left hover:bg-gray-200 dark:hover:bg-gray-700">Oscuro</button>
        </div>
      </div>
    </div>
  </nav>
  <section class="pt-32 text-center mb-8">
    <h2 class="text-4xl font-black">ARMAS</h2>
  </section>
  <main class="px-8">
    <div id="contenedorArmas" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
  </main>
  <div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50">
    <div id="modalContent" class="bg-white dark:bg-gray-900 rounded-2xl p-6 max-w-md w-full relative">
      <button id="closeModal"
        class="absolute top-3 right-4 text-xl text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-white">✕</button>
      <div id="modalBody" class="mt-8"></div>
    </div>
  </div>
</body>

</html>
