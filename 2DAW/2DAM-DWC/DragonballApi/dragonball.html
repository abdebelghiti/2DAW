<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Ball</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="dragonballApi.js" defer></script>
</head>
<body class="bg-gray-800 min-h-screen p-6">

    <h1 class="text-3xl font-bold text-center text-yellow-500 mb-8">
        Personajes Dragon Ball
    </h1>

    <div id="contenedorPersonajes"
         class="grid gap-6 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
    </div>

    <div id="modal"
         class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">

        <div class="bg-white rounded-xl shadow-xl w-[90%] max-w-md p-6 relative">

            <button id="cerrarModal"
                    class="absolute top-3 right-4 text-2xl font-bold text-gray-500 hover:text-black">
                &times;
            </button>

            <img id="modalImagen"
                 class="mx-auto h-72 object-contain mb-4"
                 alt="">

            <h2 id="modalNombre"
                class="text-2xl font-semibold text-center mb-4">
            </h2>

            <div class="space-y-2 text-center">
                <p><span class="font-semibold">Raza:</span> <span id="modalRaza"></span></p>
                <p><span class="font-semibold">Planeta:</span> <span id="modalPlaneta"></span></p>
                <p><span class="font-semibold">Ki:</span> <span id="modalKi"></span></p>
            </div>
        </div>
    </div>

</body>
</html>
