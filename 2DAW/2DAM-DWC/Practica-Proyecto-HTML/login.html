<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    
    <form action="tabla.html" method="get">

        <fieldset>
            <legend>
                <h1>Formulario de Login</h1>
            </legend>

            <div>
                <label>Email: </label>
                <input type="email" name="Email" placeholder="Introduce el email" required/>
            </div>
    
            <div>
                <label>Contraseña: </label>
                <input type="password" name="Contraseña" placeholder="Introduce la contraseña" required/>
            </div>

            <div>
                <input type="checkbox" name="Recuerdame" id="Recuerdame">
                <label>Recuérdame</label>
            </div>

            <div>
                <button type="submit">Entrar</button>
            </div>

        </fieldset>

    </form>

    <div>
        <label>No estás registrado?</label>
        <a href="registro.html"><button>Regístrate</button></a>
    </div>

    <br>

    <div>
        <a href="lista-enlaces.html"><button>Regresar a lista de enlaces</button></a>
    </div>

</body>
</html>
