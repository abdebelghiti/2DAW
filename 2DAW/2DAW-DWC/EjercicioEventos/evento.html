<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
    <script type="text/javascript" src="evento.js" defer></script>
</head>
<body>
    <div id="containerHead">
        <label>Caras: </label>
        <button onclick="clickCara('😄')">😄</button>
        <button onclick="clickCara('😉')">😉</button>
        <button onclick="clickCara('😂')">😂</button>
    </div>

    <br>

    <div id="containerBody">
        <label>Ropa: </label>
        <button onclick="clickRopa('👚')">👚</button>
        <button onclick="clickRopa('👕')">👕</button>
        <button onclick="clickRopa('👘')">👘</button>
    </div>

    <br>

    <div id="containerBottom">
        <label>Zapatos: </label>
        <button onclick="clickZapato('👟')">👟</button>
        <button onclick="clickZapato('👞')">👞</button>
        <button onclick="clickZapato('🥾')">🥾</button>
    </div>

    <h1 id="resultado"></h1>

</body>
</html>
