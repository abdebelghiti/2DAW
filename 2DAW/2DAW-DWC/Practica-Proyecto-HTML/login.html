<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/nav.js" defer></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Contenedor principal -->
    <div class="flex flex-1 items-center justify-center">

        <form action="tabla.html"
              method="get"
              class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">

            <fieldset class="space-y-5">
                <legend class="text-center mb-4">
                    <h1 class="text-2xl font-bold">Formulario de Login</h1>
                </legend>

                <!-- Email -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Email</label>
                    <input
                        type="email"
                        name="Email"
                        placeholder="Introduce el email"
                        required
                        class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    />
                </div>

                <!-- Contraseña -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Contraseña</label>
                    <input
                        type="password"
                        name="Contraseña"
                        placeholder="Introduce la contraseña"
                        required
                        class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    />
                </div>

                <!-- Recuérdame -->
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="Recuerdame" id="Recuerdame">
                    <label for="Recuerdame">Recuérdame</label>
                </div>

                <!-- Botón -->
                <div>
                    <button
                        type="submit"
                        class="w-full bg-emerald-600 text-white py-2 rounded hover:bg-emerald-700 transition">
                        Entrar
                    </button>
                </div>
            </fieldset>
        </form>
    </div>

    <!-- Enlaces inferiores -->
    <div class="flex justify-center gap-6 mb-6">

        <div class="flex items-center gap-2">
            <span>No estás registrado?</span>
            <a href="registro.html">
                <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Regístrate
                </button>
            </a>
        </div>

        <a href="lista-enlaces.html">
            <button class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-800">
                Regresar a lista de enlaces
            </button>
        </a>
    </div>

</body>
</html>
