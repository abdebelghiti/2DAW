<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar usuario</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Main JS -->
    <script src="js/main.js" defer></script>

    <!-- Navbar dinámico -->
    <script src="js/nav.js" defer></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Contenedor principal -->
    <div class="flex flex-1 items-center justify-center">

        <form id="formCrud" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">

            <fieldset class="space-y-4">
                <legend class="text-center mb-4">
                    <h1 class="text-2xl font-bold">Modificar usuario</h1>
                </legend>

                <!-- Nombre -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Nombre</label>
                    <input type="text" id="crudNombre" name="Nombre" placeholder="Nombre"
                        class="border rounded px-3 py-2" />
                </div>

                <!-- Apellidos -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Apellidos</label>
                    <input type="text" id="crudApellidos" name="Apellidos" placeholder="Apellidos"
                        class="border rounded px-3 py-2" />
                </div>

                <!-- Email -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Email</label>
                    <input type="email" id="crudEmail" name="Email" placeholder="Email"
                        class="border rounded px-3 py-2" />
                </div>

                <!-- Contraseña -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Contraseña</label>
                    <input type="text" id="crudPassword" name="Password" placeholder="Nueva contraseña (opcional)"
                        class="border rounded px-3 py-2" />
                </div>

                <!-- Teléfono -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Teléfono</label>
                    <input type="tel" id="crudTelefono" name="Telefono" placeholder="Teléfono"
                        class="border rounded px-3 py-2" />
                </div>

                <!-- Fecha de Nacimiento -->
                <div class="flex flex-col">
                    <label class="font-semibold mb-1">Fecha de Nacimiento</label>
                    <input type="date" id="crudFechaNacimiento" name="FechaNacimiento"
                        class="border rounded px-3 py-2" />
                </div>

                <!-- Sexo -->
                <div>
                    <label class="font-semibold block mb-2">Sexo</label>
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-1">
                            <input type="radio" name="Sexo" id="crudSexoH" value="H">
                            Hombre
                        </label>
                        <label class="flex items-center gap-1">
                            <input type="radio" name="Sexo" id="crudSexoM" value="M">
                            Mujer
                        </label>
                    </div>
                </div>

                <!-- Acciones principales -->
                <div class="flex gap-3">
                    <button type="submit"
                        class="flex-1 w-full bg-emerald-600 text-white py-2 rounded hover:bg-emerald-700">
                        Guardar cambios
                    </button>

                    <button type="button" id="btnEliminarCrud"
                        class="flex-1 w-full bg-red-600 text-white py-2 rounded hover:bg-red-700">
                        Eliminar usuario
                    </button>
                </div>

                <!-- Navegación -->
                <div class="flex flex-col gap-3 mt-4">
                    <a href="tabla.html">
                        <button type="button" class="w-full bg-gray-600 text-white py-2 rounded hover:bg-gray-700">
                            Regresar a tabla
                        </button>
                    </a>

                    <a href="lista-enlaces.html">
                        <button type="button" class="w-full bg-gray-800 text-white py-2 rounded hover:bg-gray-900">
                            Regresar a lista de enlaces
                        </button>
                    </a>
                </div>

            </fieldset>
        </form>
    </div>

</body>

</html>
