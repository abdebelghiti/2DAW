<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
</head>
<body>

    <form action="tabla.html" method="post">

        <fieldset>

            <legend>
                <h1>Modificar usuario</h1>
            </legend>

            <div>
                <label>Nombre: </label>
                <input type="text" placeholder="Nombre" value="Abdessamad">
            </div>

            <div>
                <label>Apellidos: </label>
                <input type="text" placeholder="Apellidos" value="Belghiti">
            </div>

            <div>
                <label>Email</label>
                <input type="email" placeholder="Email" value="abdessamad455@gmail.com">
            </div>

            <div>
                <label>Teléfono</label>
                <input type="tel" placeholder="Teléfono" value="688444555">
            </div>

            <div>
                <label>Sexo: </label>

                <label for="Hombre">Hombre</label>
                <input type="radio" name="Sexo" id="Hombre" value="Hombre" checked/>   
            
                <label for="Mujer">Mujer</label>
                <input type="radio" name="Sexo" id="Mujer" value="Mujer"/>
                
            </div>

            <div>
                <a href="tabla.html"><button>Guardar cambios</button></a>
                <a href="tabla.html"><button>Eliminar usuario</button></a>
            </div>

            <br>

            <div>
                <a href="tabla.html"><button>Regresar a tabla</button></a>
            </div>

            <br>

            <div>
                <a href="lista-enlaces.html"><button>Regresar a lista de enlaces</button></a>
            </div>
        </fieldset>
    </form>

</body>
</html>
